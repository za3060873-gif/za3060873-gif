<svg xmlns="http://www.w3.org/2000/svg" width="460" height="220" viewBox="0 0 460 220">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#2d1250"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#a239ca"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ef1ff"/>
      <stop offset="100%" stop-color="#a239ca"/>
    </linearGradient>

    <clipPath id="statsClip"><rect width="460" height="220" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#statsClip)">
    <rect width="460" height="220" fill="url(#cardBg)"/>
    <rect x="0.75" y="0.75" width="458.5" height="218.5" rx="15" fill="none" stroke="#4a2472" stroke-width="1.5"/>
    <text x="24" y="34" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f3e9ff">GitHub Stats</text>

    <g transform="translate(70,110)">
      <circle r="46" fill="none" stroke="#3a1c5c" stroke-width="10"/>
      <circle r="46" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="289.0" stroke-dashoffset="289.0" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" from="289.0" to="52.0" begin="0.3s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </circle>
      <text x="0" y="6" text-anchor="middle" font-family="'Fira Code',monospace" font-size="18" font-weight="700" fill="#ffffff">A+</text>
    </g>

    
      <g transform="translate(150,96)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e7d6ff">Repositories</text>
        <rect x="0" y="8" width="210" height="9" rx="4.5" fill="#3a1c5c"/>
        <rect x="0" y="8" width="0" height="9" rx="4.5" fill="url(#barGrad2)">
          <animate attributeName="width" from="0" to="126.0" begin="0.30s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        </rect>
        <text x="220" y="16" font-family="'Fira Code',monospace" font-size="12" fill="#ffd76e" opacity="0">24
          <animate attributeName="opacity" from="0" to="1" begin="0.90s" dur="0.4s" fill="freeze"/>
        </text>
      </g>
      <g transform="translate(150,126)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e7d6ff">Commits (this year)</text>
        <rect x="0" y="8" width="210" height="9" rx="4.5" fill="#3a1c5c"/>
        <rect x="0" y="8" width="0" height="9" rx="4.5" fill="url(#barGrad2)">
          <animate attributeName="width" from="0" to="130.2" begin="0.50s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        </rect>
        <text x="220" y="16" font-family="'Fira Code',monospace" font-size="12" fill="#ffd76e" opacity="0">310
          <animate attributeName="opacity" from="0" to="1" begin="1.10s" dur="0.4s" fill="freeze"/>
        </text>
      </g>
      <g transform="translate(150,156)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e7d6ff">Stars Earned</text>
        <rect x="0" y="8" width="210" height="9" rx="4.5" fill="#3a1c5c"/>
        <rect x="0" y="8" width="0" height="9" rx="4.5" fill="url(#barGrad2)">
          <animate attributeName="width" from="0" to="94.5" begin="0.70s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        </rect>
        <text x="220" y="16" font-family="'Fira Code',monospace" font-size="12" fill="#ffd76e" opacity="0">18
          <animate attributeName="opacity" from="0" to="1" begin="1.30s" dur="0.4s" fill="freeze"/>
        </text>
      </g>
      <g transform="translate(150,186)">
        <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e7d6ff">Contributed To</text>
        <rect x="0" y="8" width="210" height="9" rx="4.5" fill="#3a1c5c"/>
        <rect x="0" y="8" width="0" height="9" rx="4.5" fill="url(#barGrad2)">
          <animate attributeName="width" from="0" to="63.0" begin="0.90s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        </rect>
        <text x="220" y="16" font-family="'Fira Code',monospace" font-size="12" fill="#ffd76e" opacity="0">6
          <animate attributeName="opacity" from="0" to="1" begin="1.50s" dur="0.4s" fill="freeze"/>
        </text>
      </g>
  </g>
</svg>